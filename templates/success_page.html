<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация прошла успешно</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #80deea);
            color: #004d40;
            text-align: center;
            padding-top: 80px;
            margin: 0;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            font-size: 18px;
            margin-bottom: 12px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.45;
        }
        .note {
            font-size: 16px;
            color: #00695c;
            margin-top: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Авторизация прошла успешно</h1>
    <p>Аккаунт связан с ботом - продолжайте работу прямо в Telegram.</p>
    <div class="note">Эту вкладку можно закрыть.</div>

    <script>
        if (window.Telegram && Telegram.WebApp) {
            let tg = Telegram.WebApp;
            tg.sendData(JSON.stringify({status: 'ok'}));
            try { tg.close(); } catch (e) {}
        }
    </script>
</body>
</html>
