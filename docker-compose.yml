version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  migrate:
    build: .
    command: python manage.py migrate
    volumes:
      - .:/usr/src/app
    depends_on:
      - db
    env_file:
      - .env
    restart: "no"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/usr/src/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env

  bot:
    build: .
    command: python manage.py runbot
    volumes:
      - .:/usr/src/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      web:
        condition: service_started
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
